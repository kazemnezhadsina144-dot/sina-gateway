name: Gateway Watchdog Deadman

# ROI: 2x/day direct Railway probe — CF gateway-ops already runs */15.
# No nested gateway-ops curl; no fake alert steps.
on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Probe production /ready
        run: |
          set -euo pipefail
          body=$(curl -fsS "https://sina-gateway-production.up.railway.app/ready")
          echo "$body"
          echo "$body" | jq -e '.ok == true and .captureMode == "supabase" and .supabaseTableReady == true'
