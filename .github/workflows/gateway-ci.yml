name: Gateway CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci || npm install

      - name: Unit and routing tests
        run: npm test

      - name: Syntax check
        run: npm run check

      - name: Schema drift
        run: npm run check:schema

      - name: Shared routing
        run: npm run test:shared-routing

      - name: Server hardening
        run: npm run test:server-hardening

      - name: Notifications dry-run
        run: npm run test:notifications

      - name: Turnstile modes
        run: npm run test:turnstile

      - name: Local E2E
        run: npm run e2e:local

      - name: D2 list validator
        run: npm run validate:d2-list
