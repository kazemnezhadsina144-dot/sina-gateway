name: Gateway Heartbeat Manual

# ROI: no schedule — daily heartbeat is CF gateway-ops only (07:00 PT window).
# Manual run probes Railway infra directly; never triggers Telegram or fake commercial checks.
on:
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Probe production infra
        run: |
          set -euo pipefail
          body=$(curl -fsS "https://sina-gateway-production.up.railway.app/ready")
          echo "$body" | jq .
          echo "$body" | jq -e '.ok == true and .supabaseTableReady == true'
