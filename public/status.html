<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Status — Sina Gateway</title>
    <meta
      name="description"
      content="Live operational status for Sina Gateway capture, notifications, and outbound motion counters."
    />
    <link rel="canonical" href="https://sina-gateway-production.up.railway.app/status.html" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell legal-page status-page">
      <p class="eyebrow"><a href="/">Sina Gateway</a></p>
      <h1>System status</h1>
      <p class="lede">Live checks against this gateway. Refreshes when you reload.</p>

      <section class="status-panel" id="status-panel" aria-live="polite">
        <p>Loading…</p>
      </section>

      <p class="legal-back"><a href="/">← Back to intake</a></p>
    </main>
    <script type="module">
      const panel = document.querySelector("#status-panel");

      function row(label, value, ok) {
        const cls = ok === true ? "status-ok" : ok === false ? "status-fail" : "";
        return `<div class="status-row ${cls}"><span>${label}</span><strong>${value}</strong></div>`;
      }

      function formatCheckedAt(value) {
        if (!value) return "—";
        try {
          return new Date(value).toLocaleString();
        } catch {
          return value;
        }
      }

      try {
        const [healthRes, readyRes, statusRes] = await Promise.all([
          fetch("/health"),
          fetch("/ready"),
          fetch("/api/status"),
        ]);
        const health = await healthRes.json();
        const ready = await readyRes.json();
        const status = statusRes.ok ? await statusRes.json() : {};
        const overall = healthRes.ok && readyRes.ok && ready.ok !== false;

        panel.innerHTML = `
          <p class="status-verdict ${overall ? "status-ok" : "status-fail"}">${overall ? "Operational" : "Degraded"}</p>
          ${row("Health", healthRes.ok ? "OK" : "FAIL", healthRes.ok)}
          ${row("Capture", ready.captureMode || "unknown", ready.captureMode === "supabase")}
          ${row("Supabase table", ready.supabaseTableReady ? "ready" : "not ready", ready.supabaseTableReady)}
          ${row("Turnstile", ready.turnstileConfigured ? "on" : "off", ready.turnstileConfigured ? true : null)}
          ${row("Notifications", ready.notificationsConfigured ? "on" : "off", ready.notificationsConfigured)}
          ${row("Version", ready.version || health.version || "—", null)}
          ${row("Status checked", formatCheckedAt(status.checkedAt), null)}
          ${row("Last signal", formatCheckedAt(status.lastSignalAt), status.lastSignalAt ? true : null)}
          ${row("Outbound sends logged", String(status.offersSent ?? "—"), null)}
          ${row("Replies logged", String(status.replies ?? "—"), null)}
          ${row("Active campaign", status.campaign || "—", null)}
        `;
      } catch {
        panel.innerHTML = `<p class="status-verdict status-fail">Unreachable</p>`;
      }
    </script>
  </body>
</html>
